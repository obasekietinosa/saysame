<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Indigo bubble gradient -->
    <linearGradient id="indigoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818CF8" />
      <stop offset="100%" stop-color="#4F46E5" />
    </linearGradient>

    <!-- Purple bubble gradient -->
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C084FC" />
      <stop offset="100%" stop-color="#9333EA" />
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Left Bubble (Purple) -->
  <path d="M 55,45
           C 55,25 35,15 25,15
           C 10,15 10,35 10,45
           C 10,55 10,65 20,65
           L 20,75
           L 30,65
           C 45,65 55,55 55,45 Z"
        fill="url(#purpleGradient)"
        filter="url(#shadow)" />

  <!-- Right Bubble (Indigo) -->
  <path d="M 45,55
           C 45,75 65,85 75,85
           C 90,85 90,65 90,55
           C 90,45 90,35 80,35
           L 80,25
           L 70,35
           C 55,35 45,45 45,55 Z"
        fill="url(#indigoGradient)"
        filter="url(#shadow)" />

  <!-- Overlapping Intersection / "S" motif -->
  <path d="M 45,55
           C 45,45 55,35 70,35
           L 80,25
           C 70,15 55,15 45,25
           C 35,35 45,45 45,55 Z"
        fill="white"
        opacity="0.2" />

</svg>
